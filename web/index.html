<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock RAG</title>
    <link rel="stylesheet" href="css/app.css?v=3">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>Stock RAG</h1>
                <p>股票信息查询与分析</p>
            </div>
            <div class="sidebar-actions">
                <button type="button" class="btn btn-primary btn-block" id="new-chat-btn">+ 新对话</button>
            </div>
            <div class="conversations-list" id="conversations-list"></div>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <h2 class="topbar-title" id="current-conversation-title">新对话</h2>
                <div class="topbar-user">
                    <span class="user-badge" id="username-display"></span>
                    <button type="button" class="btn btn-ghost" id="logout-btn">退出</button>
                </div>
            </header>

            <div class="chat-scroll" id="chat-container">
                <div class="empty-state" id="empty-state">
                    <h3>开始新对话</h3>
                    <p>点击左侧「新对话」，或选择历史会话继续</p>
                </div>
            </div>

            <footer class="composer">
                <div class="composer-inner">
                    <textarea id="message-input" rows="1" placeholder="输入股票相关问题… Enter 发送，Shift+Enter 换行"></textarea>
                    <button type="button" class="btn btn-primary" id="send-button">发送</button>
                </div>
                <p class="composer-hint">流式响应：回答将逐字显示</p>
            </footer>
        </main>
    </div>

    <script src="js/vendor/marked.min.js?v=3"></script>
    <script src="js/vendor/purify.min.js?v=3"></script>
    <script src="js/markdown.js?v=3"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat-app.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await Auth.ensureAuthenticated({ redirect: true });
            if (ok) await ChatApp.init();
        });
    </script>
</body>
</html>
