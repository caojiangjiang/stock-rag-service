<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock RAG 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 40px);
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .new-chat-btn {
            margin: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s ease;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }

        .conversation-item {
            padding: 15px;
            margin-bottom: 8px;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .conversation-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .conversation-item.active {
            border-color: #667eea;
            background: #eef2ff;
        }

        .conversation-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .conversation-preview {
            font-size: 0.85rem;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .conversation-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
        }

        .delete-conv-btn {
            float: right;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .delete-conv-btn:hover {
            color: #ff4757;
            background: #ffebee;
        }

        /* 主聊天区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1.5rem;
        }

        #user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .user-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60%;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .bot-message {
            background: white;
            color: #333;
            margin-right: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-content {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .message-time {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #667eea;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #message-input:focus {
            border-color: #764ba2;
        }

        #send-button {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #send-button:hover {
            transform: translateY(-2px);
        }

        #send-button:active {
            transform: translateY(0);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .citations {
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #666;
        }

        .citations h4 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .citation-item {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📈 Stock RAG</h1>
                <p>股票信息查询与分析</p>
            </div>
            <button class="new-chat-btn" onclick="createNewConversation()">
                <span>+</span> 新对话
            </button>
            <div class="conversations-list" id="conversations-list">
                <!-- 对话列表将动态加载 -->
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="main-content">
            <div class="header">
                <div>
                    <h2 class="header-title" id="current-conversation-title">新对话</h2>
                </div>
                <div id="user-section">
                    <button id="login-btn" class="user-btn" onclick="window.location.href='login.html'">登录</button>
                    <button id="register-btn" class="user-btn" onclick="window.location.href='register.html'">注册</button>
                    <div id="user-info" style="display: none;">
                        <span id="username-display"></span>
                        <button id="logout-btn" class="user-btn" onclick="logout()">退出</button>
                    </div>
                </div>
            </div>
            <div class="chat-container" id="chat-container">
                <div class="empty-state" id="empty-state">
                    <h3>选择或创建一个对话</h3>
                    <p>开始与 Stock RAG 进行股票分析对话</p>
                </div>
            </div>
            <div class="input-container">
                <div class="input-group">
                    <input type="text" id="message-input" placeholder="请输入你的问题...">
                    <button id="send-button">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const conversationsList = document.getElementById('conversations-list');
        const currentConversationTitle = document.getElementById('current-conversation-title');
        const emptyState = document.getElementById('empty-state');

        // 当前对话ID
        let currentConversationID = null;
        let conversations = [];

        // 获取当前用户ID
        function getCurrentUserID() {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                return user.id || user.user_id || user.username || 'anonymous';
            }
            return 'anonymous';
        }

        // 检查用户登录状态
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            if (token && userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('register-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('username-display').textContent = user.username;
            } else {
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('register-btn').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
            }
        }

        // 登出
        function logout() {
            const token = localStorage.getItem('token');

            if (token) {
                fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                }).then(() => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                }).catch(() => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                });
            } else {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        // 加载对话列表
        async function loadConversations() {
            const token = localStorage.getItem('token');
            const headers = {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch(`/api/conversations?user_id=${getCurrentUserID()}`, {
                headers: headers
            });
            
            if (response.ok) {
                conversations = await response.json();
                renderConversations();
                
                // 如果有保存的对话，自动加载最新一个的消息
                if (conversations.length > 0) {
                    const latestConv = conversations[0];
                    switchConversation(latestConv.id);
                }
            }
        }

        // 渲染对话列表
        function renderConversations() {
            conversationsList.innerHTML = '';

            // 添加已保存的对话
            conversations.forEach(conv => {
                const convItem = document.createElement('div');
                convItem.className = 'conversation-item ' + (currentConversationID === conv.id ? 'active' : '');
                convItem.onclick = () => switchConversation(conv.id);
                
                // 获取最后一条消息作为预览
                let preview = conv.title || '暂无消息';
                let timeStr = '';
                if (conv.updated_at) {
                    const date = new Date(conv.updated_at * 1000);
                    timeStr = date.toLocaleDateString();
                }

                convItem.innerHTML = `
                    <button class="delete-conv-btn" onclick="event.stopPropagation(); deleteConversation('${conv.id}')">×</button>
                    <div class="conversation-title">${conv.title || '未命名对话'}</div>
                    <div class="conversation-preview">${preview}</div>
                    <div class="conversation-time">${timeStr}</div>
                `;
                conversationsList.appendChild(convItem);
            });
        }

        // 创建新对话（点击按钮时调用，会持久化）
        async function createNewConversation() {
            // 设置对话标题
            currentConversationTitle.textContent = '未命名对话';
            
            // 显示欢迎消息
            chatContainer.innerHTML = `
                <div class="message bot-message">
                    <div class="message-content">
                        你好！我是Stock RAG系统，我可以帮你查询和分析股票信息。请输入你的问题，我会尽力为你解答。
                    </div>
                </div>
            `;
            emptyState.style.display = 'none';
            
            // 立即向后端创建对话（持久化）
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            
            try {
                const response = await fetch('/api/conversations/create', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        user_id: getCurrentUserID(),
                        title: '未命名对话'
                    })
                });
                
                if (response.ok) {
                    const createdConv = await response.json();
                    currentConversationID = createdConv.id;
                }
            } catch (error) {
                console.error('Failed to create conversation:', error);
            }
            
            // 重新加载对话列表（确保包含新创建的对话）
            await loadConversations();
            
            messageInput.focus();
        }

        // 打开临时对话窗口（点击列表中的"新对话"时调用，不持久化）
        function openTemporaryConversation() {
            currentConversationID = null;
            currentConversationTitle.textContent = '新对话';
            chatContainer.innerHTML = `
                <div class="message bot-message">
                    <div class="message-content">
                        你好！我是Stock RAG系统，我可以帮你查询和分析股票信息。请输入你的问题，我会尽力为你解答。
                    </div>
                </div>
            `;
            emptyState.style.display = 'none';
            renderConversations();
            messageInput.focus();
        }

        // 切换对话
        async function switchConversation(conversationID) {
            if (conversationID === null) {
                openTemporaryConversation();
                return;
            }

            currentConversationID = conversationID;
            emptyState.style.display = 'none';
            
            // 获取对话标题
            const conv = conversations.find(c => c.id === conversationID);
            if (conv) {
                currentConversationTitle.textContent = conv.title || '未命名对话';
            }

            // 获取对话消息
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch(`/api/conversations/messages?conversation_id=${conversationID}`, {
                headers: headers
            });

            if (response.ok) {
                const messages = await response.json();
                chatContainer.innerHTML = '';
                
                messages.forEach(msg => {
                    addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot', msg.created_at);
                });
            } else {
                // 如果没有历史消息，显示欢迎消息
                chatContainer.innerHTML = `
                    <div class="message bot-message">
                        <div class="message-content">
                            欢迎回来！继续我们的对话吧。
                        </div>
                    </div>
                `;
            }

            renderConversations();
            messageInput.focus();
        }

        // 删除对话
        async function deleteConversation(conversationID) {
            if (!confirm('确定要删除这个对话吗？')) {
                return;
            }

            const token = localStorage.getItem('token');
            const headers = {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            const response = await fetch(`/api/conversations/delete?conversation_id=${conversationID}`, {
                method: 'DELETE',
                headers: headers
            });

            if (response.ok) {
                conversations = conversations.filter(c => c.id !== conversationID);
                if (currentConversationID === conversationID) {
                    // 如果还有其他对话，切换到最新的一个
                    if (conversations.length > 0) {
                        switchConversation(conversations[0].id);
                    } else {
                        // 如果没有对话了，显示空状态
                        currentConversationID = null;
                        currentConversationTitle.textContent = '';
                        chatContainer.innerHTML = '';
                        emptyState.style.display = 'block';
                    }
                }
                renderConversations();
            }
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 如果当前没有对话，创建一个新的
            if (!currentConversationID) {
                currentConversationID = 'conversation-' + Date.now();
            }

            // 添加用户消息
            addMessage(message, 'user');

            // 清空输入框
            messageInput.value = '';

            // 发送请求
            await sendRequest(message);
        }

        // 添加消息到聊天容器
        function addMessage(content, sender, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            if (timestamp) {
                timeDiv.textContent = new Date(timestamp).toLocaleTimeString();
            } else {
                timeDiv.textContent = new Date().toLocaleTimeString();
            }

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);

            chatContainer.appendChild(messageDiv);

            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 发送请求到后端
        async function sendRequest(message) {
            // 添加加载消息
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerHTML = '<div class="message-content"><div class="loading"></div> 正在思考...</div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 构建请求数据
            const data = {
                message: message,
                conversation_id: currentConversationID || '',
                user_id: getCurrentUserID()
            };

            // 获取token
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }

            // 发送请求
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // 移除加载消息
                chatContainer.removeChild(loadingDiv);

                // 更新会话ID
                if (result.conversation_id) {
                    currentConversationID = result.conversation_id;
                }

                // 处理回答
                let answer = result.content || result.error || '无内容返回';

                // 添加引用
                if (result.citations && result.citations.length > 0) {
                    answer += '<div class="citations">';
                    answer += '<h4>引用来源：</h4>';
                    result.citations.forEach((citation, index) => {
                        answer += `<div class="citation-item">${index+1}. ${citation.title} (${citation.doc_type})</div>`;
                    });
                    answer += '</div>';
                }

                // 添加机器人消息
                addMessage(answer, 'bot');

                // 刷新对话列表
                await loadConversations();
            } catch (error) {
                // 移除加载消息
                chatContainer.removeChild(loadingDiv);

                // 添加错误消息
                addMessage('抱歉，我遇到了一些问题，请稍后再试。', 'bot');
                console.error('Error:', error);
            }
        }

        // 页面加载时检查登录状态并加载对话列表
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadConversations();
        });

        // 绑定事件
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
