<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Stock RAG</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>创建账号</h1>
            <p class="subtitle">注册 Stock RAG 智能分析账户</p>

            <div id="error" class="alert-error"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" required minlength="3" maxlength="20" placeholder="3–20 个字符">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" required minlength="6" placeholder="至少 6 位">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" required minlength="6" placeholder="再次输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>

            <div class="auth-links">
                <p>已有账号？ <a href="login.html">立即登录</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (await Auth.redirectIfAuthenticated()) return;

            const form = document.getElementById('registerForm');
            const errorDiv = document.getElementById('error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                if (password !== confirmPassword) {
                    errorDiv.textContent = '两次输入的密码不一致';
                    errorDiv.classList.add('show');
                    return;
                }

                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: document.getElementById('username').value,
                            email: document.getElementById('email').value,
                            password,
                        }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        Auth.saveSession(data);
                        location.replace('index.html');
                    } else {
                        errorDiv.textContent = data.error || '注册失败';
                        errorDiv.classList.add('show');
                    }
                } catch {
                    errorDiv.textContent = '网络错误，请稍后重试';
                    errorDiv.classList.add('show');
                }
            });
        });
    </script>
</body>
</html>
