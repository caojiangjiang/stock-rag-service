<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Stock RAG</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>Stock RAG</h1>
            <p class="subtitle">登录以使用股票智能分析</p>

            <div id="error" class="alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" required minlength="3" maxlength="20" placeholder="3–20 个字符" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" required minlength="6" placeholder="至少 6 位" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>

            <div class="auth-links">
                <p>还没有账号？ <a href="register.html">立即注册</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (await Auth.redirectIfAuthenticated()) return;

            const form = document.getElementById('loginForm');
            const errorDiv = document.getElementById('error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: document.getElementById('username').value,
                            password: document.getElementById('password').value,
                        }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        Auth.saveSession(data);
                        const params = new URLSearchParams(location.search);
                        location.replace(params.get('next') || 'index.html');
                    } else {
                        errorDiv.textContent = data.error || '登录失败';
                        errorDiv.classList.add('show');
                    }
                } catch {
                    errorDiv.textContent = '网络错误，请稍后重试';
                    errorDiv.classList.add('show');
                }
            });
        });
    </script>
</body>
</html>
