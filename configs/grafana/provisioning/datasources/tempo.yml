apiVersion: 1

deleteDatasources:
  - name: Tempo
    orgId: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -15m
        spanEndTimeShift: 15m
        tags: []
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{job="stock_rag"} |= "$${__trace.traceId}"'
      lokiSearch:
        datasourceUid: loki
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      # 关闭 trace 查询的时间窗口：Grafana 会用「当前时间 ±1h」作为 start/end，
      # 导致 Search 能搜到、按 ID 打开却 404（trace 实际发生在过去）
      traceQuery:
        timeShiftEnabled: false
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
    version: 4
