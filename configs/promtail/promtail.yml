server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 本机 go run 须在 .env 设置 LOG_FILE=logs/app.log（结构化 JSON，含 trace_id）
  - job_name: stock_rag
    static_configs:
      - targets:
          - localhost
        labels:
          job: stock_rag
          service: stock_rag
          service_name: stock_rag
          __path__: /var/log/stock_rag/*.log
    pipeline_stages:
      - match:
          selector: '{job="stock_rag"} |~ "^\\{"'
          stages:
            - json:
                expressions:
                  timestamp: timestamp
                  trace_id: trace_id
                  span_id: span_id
                  level: level
                  message: message
                  service: service
            - timestamp:
                source: timestamp
                format: RFC3339
            # 仅保留低基数标签；trace_id 用 LogQL 行过滤 |=，避免 Loki 高基数 stream 爆炸
            - labels:
                level:
