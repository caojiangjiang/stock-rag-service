version: '3.8'

services:
  # 本地开发默认不构建 app；需要容器化 Go 服务时用: docker compose --profile app up -d
  app:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=stock_rag
      - POSTGRES_PASSWORD=stock_rag_password
      - POSTGRES_DB=stock_rag
      - ARK_API_KEY=${ARK_API_KEY}
      - ARK_MODEL=${ARK_MODEL}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - stock_rag_network

  redis:
    image: redis:7-alpine
    container_name: stock_rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - stock_rag_network

  postgres:
    image: ankane/pgvector:latest
    container_name: stock_rag_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=stock_rag
      - POSTGRES_PASSWORD=stock_rag_password
      - POSTGRES_DB=stock_rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_rag -d stock_rag"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - stock_rag_network

  # Prometheus 用于指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: stock_rag_prometheus
    ports:
      - "9091:9090"  # 宿主机 9090 常被占用，对外用 9091
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  grafana:
    # Jaeger 数据源在 Grafana 13 下 TraceID 查询易显示 No data；Trace 请用 Tempo 数据源
    image: grafana/grafana:11.6.2
    container_name: stock_rag_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
      - jaeger
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  loki:
    image: grafana/loki:3.0.0
    container_name: stock_rag_loki
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  promtail:
    image: grafana/promtail:3.0.0
    container_name: stock_rag_promtail
    volumes:
      - ./configs/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/stock_rag:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  # 本机 Go 的 OTLP 统一打到 collector，再转发到 Jaeger + Tempo
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: stock_rag_otel_collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./configs/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
      - tempo
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  tempo:
    image: grafana/tempo:2.4.1
    container_name: stock_rag_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./configs/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

  # Jaeger UI（:16686）；Grafana 内查 Trace 请用 Tempo 数据源
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "6831:6831/udp"  # Jaeger agent (compact thrift)
      - "14268:14268"  # Jaeger collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - stock_rag_network
    profiles:
      - monitoring

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  stock_rag_network:
    driver: bridge
