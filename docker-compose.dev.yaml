version: '3.8'

services:
  # PostgreSQL 数据库（带 pgvector 扩展）
  postgres:
    image: ankane/pgvector:latest
    container_name: stock_rag_postgres
    environment:
      POSTGRES_DB: stock_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stock_rag_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: stock_rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stock_rag_network

  # Jaeger（用于 OTLP 追踪）
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: stock_rag_jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # Web UI
      - "14268:14268"
      - "14250:14250"
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - stock_rag_network

volumes:
  postgres_data:
  redis_data:

networks:
  stock_rag_network:
    driver: bridge
